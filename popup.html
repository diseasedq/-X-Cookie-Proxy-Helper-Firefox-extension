<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 380px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e7e9ea;
            padding: 14px;
        }

        body.in-tab {
            width: 420px;
            max-width: 100%;
            margin: 20px auto;
        }

        .pin-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 6px;
        }

        .pin-bar button {
            width: auto;
            padding: 4px 10px;
            font-size: 10px;
            background: #222;
            color: #888;
            border-radius: 4px;
        }

        .pin-bar button:hover {
            color: #1d9bf0;
        }

        h2 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1d9bf0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            display: inline-block;
        }

        .dot.on {
            background: #0f0;
        }

        .tab-info {
            background: #1a1a2a;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 6px 10px;
            margin-bottom: 10px;
            font-size: 10px;
            color: #8899aa;
        }

        .tab-info strong {
            color: #e7e9ea;
        }

        .section {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #2a2a2a;
        }

        label {
            font-size: 10px;
            color: #666;
            display: block;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input,
        select {
            width: 100%;
            background: #0f0f0f;
            border: 1px solid #333;
            color: #e7e9ea;
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 5px;
            outline: none;
        }

        input:focus {
            border-color: #1d9bf0;
        }

        .row {
            display: flex;
            gap: 6px;
        }

        .row>div {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.12s;
        }

        button:hover {
            opacity: 0.85;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-blue {
            background: #1d9bf0;
            color: #fff;
        }

        .btn-red {
            background: #e0245e;
            color: #fff;
        }

        .btn-green {
            background: #17bf63;
            color: #fff;
        }

        .btn-gray {
            background: #333;
            color: #bbb;
        }

        .btn-orange {
            background: #f59e0b;
            color: #000;
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 10px;
            border-radius: 5px;
            width: auto;
            min-width: 40px;
        }

        .btn-row {
            display: flex;
            gap: 6px;
            margin-top: 5px;
        }

        .btn-row button {
            flex: 1;
        }

        .hint {
            font-size: 9px;
            color: #444;
            margin-bottom: 4px;
        }

        .status {
            font-size: 10px;
            color: #666;
            text-align: center;
            margin-top: 4px;
            min-height: 14px;
        }

        .status.ok {
            color: #17bf63;
        }

        .status.err {
            color: #e0245e;
        }

        /* Account section */
        .acc-list {
            max-height: 160px;
            overflow-y: auto;
            margin-top: 6px;
        }

        .acc-item {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .acc-item:hover {
            border-color: #1d9bf0;
        }

        .acc-item.active {
            border-color: #1d9bf0;
            background: #0f1a2a;
        }

        .acc-name {
            font-size: 12px;
            font-weight: 600;
            color: #e7e9ea;
        }

        .acc-email {
            font-size: 10px;
            color: #666;
        }

        .acc-detail {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 10px;
            margin-top: 6px;
            display: none;
        }

        .acc-detail.visible {
            display: block;
        }

        .acc-field {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .acc-field:last-child {
            border: none;
        }

        .acc-field-label {
            font-size: 10px;
            color: #666;
            width: 60px;
            flex-shrink: 0;
        }

        .acc-field-value {
            font-size: 11px;
            color: #e7e9ea;
            font-family: 'SF Mono', 'Menlo', monospace;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 8px;
        }

        .acc-field-value.masked {
            color: #555;
        }

        /* Cookie output */
        .cookie-output {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 6px 8px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 10px;
            color: #aaa;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
            margin-top: 6px;
            display: none;
            line-height: 1.5;
        }

        .cookie-output.visible {
            display: block;
        }

        .ck {
            color: #1d9bf0;
        }

        .cv {
            color: #17bf63;
        }

        #fileInput {
            display: none;
        }

        textarea {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #e7e9ea;
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'SF Mono', 'Menlo', monospace;
            margin-bottom: 5px;
            outline: none;
            resize: vertical;
            min-height: 50px;
        }

        textarea:focus {
            border-color: #1d9bf0;
        }

        .paste-area {
            display: none;
            margin-top: 6px;
        }

        .paste-area.visible {
            display: block;
        }
    </style>
</head>

<body>

    <div class="pin-bar"><button id="btnPin">📌 Open in tab</button></div>
    <div class="tab-info" id="tabInfo">Tab: <strong>loading...</strong></div>

    <!-- ACCOUNTS SECTION -->
    <h2>👤 Accounts</h2>
    <div class="section">
        <div class="btn-row">
            <button class="btn-orange" id="btnTogglePaste">📋 Paste accounts</button>
        </div>
        <div class="paste-area" id="pasteArea">
            <textarea id="accTextarea" rows="4" placeholder="Paste accounts here...
user | pass | 2fa | email
user2 | pass2 | 2fa2 | email2"></textarea>
            <button class="btn-blue" id="btnParseAccounts">Load</button>
        </div>
        <div class="hint" style="margin-top:4px">Format: user|pass|2fa|email or user:pass:email:2fa</div>
        <div class="acc-list" id="accList"></div>

        <div class="acc-detail" id="accDetail">
            <div class="acc-field">
                <span class="acc-field-label">Username</span>
                <span class="acc-field-value" id="fUsername">—</span>
                <button class="btn-sm btn-gray" data-copy="fUsername">📋</button>
            </div>
            <div class="acc-field">
                <span class="acc-field-label">Email</span>
                <span class="acc-field-value" id="fEmail">—</span>
                <button class="btn-sm btn-gray" data-copy="fEmail">📋</button>
            </div>
            <div class="acc-field">
                <span class="acc-field-label">Password</span>
                <span class="acc-field-value masked" id="fPassword">•••</span>
                <button class="btn-sm btn-gray" data-copy="fPassword">📋</button>
            </div>
            <div class="acc-field">
                <span class="acc-field-label">2FA</span>
                <span class="acc-field-value" id="f2FA">—</span>
                <button class="btn-sm btn-gray" data-copy="f2FA">📋</button>
                <button class="btn-sm btn-blue" id="btn2FA" title="Generate TOTP code">🔑</button>
            </div>
            <div id="totpResult"
                style="display:none;margin-top:4px;padding:6px 8px;background:#0a1a0a;border:1px solid #17bf63;border-radius:6px;text-align:center">
                <span style="font-size:20px;font-weight:700;letter-spacing:4px;color:#17bf63"
                    id="totpCode">------</span>
                <span style="font-size:10px;color:#888;margin-left:8px" id="totpTimer">30s</span>
                <button class="btn-sm btn-gray" id="btnCopyTotp" style="margin-left:6px">📋</button>
            </div>
        </div>
        <div class="status" id="accStatus"></div>
    </div>

    <!-- PROXY SECTION -->
    <h2>🔌 Tab Proxy <span id="proxyDot" class="dot"></span></h2>
    <div class="section">
        <label>Quick paste (host:port:user:pass)</label>
        <input type="text" id="quickProxy" placeholder="1.2.3.4:8080:username:password">
        <div class="row">
            <div>
                <label>Type</label>
                <select id="proxyType">
                    <option value="http">HTTP</option>
                    <option value="socks">SOCKS5</option>
                </select>
            </div>
            <div style="flex:2">
                <label>Host</label>
                <input type="text" id="proxyHost">
            </div>
            <div>
                <label>Port</label>
                <input type="text" id="proxyPort">
            </div>
        </div>
        <div class="row">
            <div><label>User</label><input type="text" id="proxyUser"></div>
            <div><label>Pass</label><input type="password" id="proxyPass"></div>
        </div>
        <div class="btn-row">
            <button class="btn-blue" id="btnConnect">🔗 Apply to tab</button>
            <button class="btn-red" id="btnDisconnect">✕ Remove</button>
        </div>
        <div class="status" id="proxyStatus"></div>
    </div>

    <!-- COOKIES SECTION -->
    <h2>🍪 X.com Cookies</h2>
    <div class="section">
        <div id="linkedAccount" style="font-size:11px;color:#666;margin-bottom:6px;display:none">
            💾 Save with: <strong style="color:#1d9bf0" id="linkedName">—</strong>
        </div>
        <button class="btn-green" id="btnGetCookies">Extract auth_token + ct0</button>
        <div class="cookie-output" id="cookieOutput"></div>
        <div class="btn-row">
            <button class="btn-gray" id="btnCopyJson" style="display:none">📋 JSON</button>
            <button class="btn-gray" id="btnCopyLine" style="display:none">📋 Line</button>
            <button class="btn-green" id="btnSaveFile" style="display:none">💾 Save</button>
        </div>
        <div class="status" id="cookieStatus"></div>
    </div>

    <script src="totp.js"></script>
    <script src="popup.js"></script>
</body>

</html>
